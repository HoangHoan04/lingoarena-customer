name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    outputs:
      bundle_size: ${{ steps.measure.outputs.bundle_size || '' }}
      duration: ${{ steps.duration.outputs.duration || '' }}

    steps:
      - name: Notify Telegram - In Progress
        if: github.event_name == 'push'
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
          COMMIT_SHA: ${{ github.sha || '' }}
        run: |
          MSG=$(echo "${COMMIT_MSG}" | head -n1 | tr -d '\r' | sed 's/[\"`$]//g')
          SHA_SHORT=$(echo ${COMMIT_SHA} | cut -c1-7)
          REPO_NAME=$(echo '${{ github.repository }}' | cut -d/ -f2)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="🔄 <b>CI BUILD IN PROGRESS</b>

          📁 <b>Dự án:</b>     ${REPO_NAME}
          👤 <b>Nhân viên:</b> ${{ github.actor }}
          🌿 <b>Nhánh:</b>     ${{ github.ref_name }} (<code>${SHA_SHORT}</code>)
          💬 <b>Commit:</b>    ${MSG}
          ⏳ <b>Tiến trình:</b> Build and deloy ${{ github.ref_name }} — in_progress"

      - uses: actions/checkout@v4

      - name: Record build start time
        run: echo "BUILD_START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Application
        run: npm run build

      - name: Measure bundle size
        id: measure
        if: always()
        run: |
          if [ -d dist ]; then
            SIZE=$(du -sh dist | cut -f1)
            echo "bundle_size=$SIZE" >> $GITHUB_OUTPUT
          else
            echo "bundle_size=N/A" >> $GITHUB_OUTPUT
          fi

      - name: Check build duration
        id: duration
        if: always()
        run: |
          DURATION=$(($(date +%s) - BUILD_START_TIME))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          if [ $DURATION -gt 600 ]; then
            REPO_NAME=$(echo '${{ github.repository }}' | cut -d/ -f2)
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🐢 <b>SLOW BUILD DETECTED</b>

            📁 <b>Dự án:</b>     ${REPO_NAME}
            🌿 <b>Nhánh:</b>     ${{ github.ref_name }}
            ⏱️  <b>Duration:</b>  ${DURATION}s
            ⚠️  <b>Threshold:</b>  600s (10 phút)"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: always() && github.event_name == 'push'

    steps:
      - name: Prepare commit info
        id: info
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
          COMMIT_SHA: ${{ github.sha || '' }}
        run: |
          echo "sha_short=$(echo ${COMMIT_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "msg_first=$(echo "${COMMIT_MSG}" | head -n1 | tr -d '\r' | sed 's/[\"`$]//g')" >> $GITHUB_OUTPUT
          echo "repo_name=$(echo '${{ github.repository }}' | cut -d/ -f2)" >> $GITHUB_OUTPUT

      - name: Notify Telegram - Success
        if: needs.build-and-lint.result == 'success'
        env:
          SHA: ${{ steps.info.outputs.sha_short }}
          MSG: ${{ steps.info.outputs.msg_first }}
          REPO: ${{ steps.info.outputs.repo_name }}
          BUNDLE: ${{ needs.build-and-lint.outputs.bundle_size }}
          DURATION: ${{ needs.build-and-lint.outputs.duration }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="✅ <b>CI BUILD SUCCESS</b>

          📁 <b>Dự án:</b>     ${REPO}
          👤 <b>Nhân viên:</b> ${{ github.actor }}
          🌿 <b>Nhánh:</b>     ${{ github.ref_name }} (<code>${SHA}</code>)
          💬 <b>Commit:</b>    ${MSG}
          📦 <b>Bundle:</b>    ${BUNDLE}
          ⏱️  <b>Duration:</b>  ${DURATION}
          ✅ <b>Tiến trình:</b> Build and deloy ${{ github.ref_name }} — success"

      - name: Notify Telegram - Failure
        if: needs.build-and-lint.result == 'failure'
        env:
          SHA: ${{ steps.info.outputs.sha_short }}
          MSG: ${{ steps.info.outputs.msg_first }}
          REPO: ${{ steps.info.outputs.repo_name }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="❌ <b>CI BUILD FAILED</b>

          📁 <b>Dự án:</b>     ${REPO}
          👤 <b>Nhân viên:</b> ${{ github.actor }}
          🌿 <b>Nhánh:</b>     ${{ github.ref_name }} (<code>${SHA}</code>)
          💬 <b>Commit:</b>    ${MSG}
          ⏱️  <b>Duration:</b>  ${{ needs.build-and-lint.outputs.duration }}
          ❌ <b>Tiến trình:</b> Build and deloy ${{ github.ref_name }} — failure"
